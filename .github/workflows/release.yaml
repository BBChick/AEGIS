name: 'Build and Release AEGIS'

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия релиза (например: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ПУНКТ 1: Заменили libsoup2.4-dev на libsoup-3.0-dev (Для Linux)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev build-essential curl wget webkit2gtk-driver

      - name: Install frontend dependencies
        run: npm install

      # ПУНКТ 2: Добавили args: --no-bundle msi, чтобы игнорировать light.exe на Windows
      - name: Build and Release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: 'AEGIS ${{ github.event.inputs.version }}'
          releaseBody: 'Автоматическая сборка для Windows, macOS и Linux.'
          releaseDraft: false
          prerelease: false
          includeRelease: true
          includeUpdaterJson: false
          args: --no-bundle msi